<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voron 2.4 — Build Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --panel: #0e1422;
  --panel-border: #1a2340;
  --accent: #f59e0b;
  --accent-glow: rgba(245,158,11,0.15);
  --cyan: #22d3ee;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #4b556b;
  --text-muted: #2d374f;
  --success-bg: rgba(34,197,94,0.12);
  --pending-bg: rgba(245,158,11,0.12);
  --font-mono: 'Share Tech Mono', monospace;
  --font-display: 'Space Grotesk', sans-serif;
  --scanline: rgba(255,255,255,0.015);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    url('https://vorondesign.com/images/voron2.4.jpg') center/cover no-repeat fixed;
  filter: grayscale(0.6) brightness(0.25) contrast(1.3);
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
  pointer-events: none;
}

.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background-image:
    linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

#app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px;
}

.container {
  width: 100%;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ---- Header ---- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  background: var(--panel);
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: -1px; left: 40px; right: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.header-left { display: flex; align-items: center; gap: 20px; }

.header-badge {
  width: 44px; height: 44px;
  border: 2px solid var(--accent);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
}

.header-title h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1.2;
}

.header-title .sub {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 1px;
}

.header-right {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.header-right .dim {
  color: var(--accent);
  font-weight: 600;
}

/* ---- Phase Banner ---- */
.phase-banner {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 18px 28px;
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: 4px;
  background: rgba(245,158,11,0.06);
  position: relative;
  overflow: hidden;
}

.phase-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

.phase-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  min-width: 100px;
}

.phase-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  flex: 1;
}

.phase-est {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
}

.phase-pulse {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 1.8s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* ---- Main Grid ---- */
.main-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 20px;
}

@media (max-width: 800px) {
  .main-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .header-right { text-align: left; }
}

/* ---- Panel Card ---- */
.panel {
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  background: var(--panel);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--panel-border);
  background: rgba(255,255,255,0.02);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.panel-title .acc {
  color: var(--accent);
}

.panel-body { padding: 16px 20px 20px; }

/* ---- Ring Gauge ---- */
.gauge-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 16px;
}

.gauge-ring { flex-shrink: 0; }

.gauge-ring svg {
  width: 90px;
  height: 90px;
  transform: rotate(-90deg);
}

.gauge-ring .bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
.gauge-ring .fg {
  fill: none;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 226.2;
  transition: stroke-dashoffset 1s ease;
}

.gauge-info h3 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.gauge-info .sub {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ---- Progress Bars ---- */
.progress-strip { margin-bottom: 10px; }
.progress-strip:last-child { margin-bottom: 0; }

.progress-strip .label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  margin-bottom: 4px;
  color: var(--text-dim);
}

.progress-strip .label .pct {
  color: var(--accent);
  font-family: var(--font-mono);
}

.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #fbbf24);
  transition: width 1s ease;
}

/* ---- Task Table ---- */
.task-table { width: 100%; border-collapse: collapse; }

.task-table th {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--panel-border);
}

.task-table td {
  padding: 10px 12px;
  font-size: 0.82rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text);
}

.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover { background: rgba(255,255,255,0.02); }

.task-status-led {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.led.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
.led.pending { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.led.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 1.8s ease-in-out infinite; }

.task-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 2px 8px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.task-badge.done { background: var(--success-bg); color: var(--green); }
.task-badge.pending { background: var(--pending-bg); color: var(--accent); }
.task-badge.active { background: var(--active-bg, rgba(245,158,11,0.15)); color: var(--accent); border-color: var(--accent); }

.task-time {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* ---- Stats Grid ---- */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-item {
  padding: 14px 16px;
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  text-align: center;
  background: rgba(255,255,255,0.015);
}

.stat-item .num {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  font-family: var(--font-mono);
}

.stat-item .num.accent { color: var(--accent); }
.stat-item .num.cyan { color: var(--cyan); }
.stat-item .num.green { color: var(--green); }

.stat-item .lbl {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-top: 6px;
}

/* ---- Phase Timeline ---- */
.timeline {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 8px 0 4px;
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 18px;
  left: 30px;
  right: 30px;
  height: 2px;
  background: var(--panel-border);
}

.timeline-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  flex: 1;
  text-align: center;
}

.timeline-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--panel-border);
  background: var(--bg);
  position: relative;
  z-index: 1;
  transition: all 0.3s ease;
}

.timeline-dot.done {
  border-color: var(--green);
  background: var(--green);
  box-shadow: 0 0 8px rgba(34,197,94,0.4);
}

.timeline-dot.active {
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 8px rgba(245,158,11,0.4);
  animation: pulse 2s ease-in-out infinite;
}

.timeline-step .tl-name {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  max-width: 80px;
}

.timeline-step .tl-status {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.tl-status.done { color: var(--green); }
.tl-status.active { color: var(--accent); }
.tl-status.future { color: var(--text-muted); }

/* ---- Links ---- */
.links-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.link-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  text-decoration: none;
  color: var(--text);
  font-size: 0.82rem;
  transition: all 0.2s ease;
  background: rgba(255,255,255,0.015);
}

.link-item:hover {
  border-color: rgba(245,158,11,0.3);
  background: rgba(245,158,11,0.06);
  color: var(--accent);
}

.link-item .lnk-icon {
  width: 28px; height: 28px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.link-item .lnk-label { flex: 1; }
.link-item .lnk-arrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* ---- Footer ---- */
.footer {
  text-align: center;
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  border-top: 1px solid var(--panel-border);
}

.footer .hl { color: var(--accent); }

/* ---- Responsive tweaks ---- */
@media (max-width: 600px) {
  .timeline { flex-wrap: wrap; gap: 8px; }
  .timeline::before { display: none; }
  .timeline-step { flex-direction: row; gap: 10px; text-align: left; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .gauge-wrap { flex-direction: column; text-align: center; }
  .phase-banner { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div id="app"></div>
<script>
(function() {

const data = {
  tasks: [
    { name: 'Frame Construction', time: '4-6h', status: 'done', group: 'Frame' },
    { name: 'Print All Gantry Components', time: '~20h', status: 'done', group: 'Printing' },
    { name: 'Gantry Structure Assembly', time: '3-4h', status: 'done', group: 'Assembly' },
    { name: 'Assemble AB Drive Units', time: '3-4h', status: 'done', group: 'Mechanical' },
    { name: 'Assemble Front Idlers', time: '1-2h', status: 'done', group: 'Mechanical' },
    { name: 'Install & Tension Belts', time: '2-3h', status: 'active', group: 'Belts' },
    { name: 'Assemble X-Axis Carriage', time: '2-3h', status: 'pending', group: 'Mechanical' },
    { name: 'Assemble Z-Joints & Belt Clips', time: '1-2h', status: 'done', group: 'Mechanical' },
    { name: 'Assemble Z-Chain Components', time: '1-2h', status: 'done', group: 'Wiring' },
    { name: 'Assemble & Install Toolhead', time: '2-3h', status: 'pending', group: 'Toolhead' },
    { name: 'Wiring & Cable Management', time: '2-3h', status: 'pending', group: 'Wiring' },
  ],
  milestones: [
    { name: 'Frame Build', status: 'done' },
    { name: 'Gantry Assembly', status: 'active' },
    { name: 'Electronics', status: 'future' },
    { name: 'Panels', status: 'future' },
    { name: 'First Print', status: 'future' },
  ],
  phases: [
    { name: 'Frame Build', status: 'done' },
    { name: 'Gantry Assembly', status: 'active' },
    { name: 'Electronics & Wiring', status: 'future' },
    { name: 'Panels & Enclosure', status: 'future' },
    { name: 'First Print', status: 'future' },
  ]
};

const doneCount = data.tasks.filter(t => t.status === 'done').length;
const totalCount = data.tasks.length;
const pendingCount = totalCount - doneCount;
const pct = Math.round((doneCount / totalCount) * 100);
const phaseDone = data.phases.filter(p => p.status === 'done').length;
const phaseActive = data.phases.filter(p => p.status === 'active').length;

const C = 2 * Math.PI * 36;
const offset = C - (pct / 100) * C;

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="header-badge">V2</div>
          <div class="header-title">
            <h1>VORON 2.4</h1>
            <div class="sub">Gantry Build Tracker</div>
          </div>
        </div>
        <div class="header-right">
          <div class="dim">350mm &times; 400mm &times; 250mm</div>
          <div>Custom Build · rev 0.2</div>
        </div>
      </div>

      <!-- Phase Banner -->
      <div class="phase-banner">
        <span class="phase-pulse"></span>
        <span class="phase-label">Current Phase</span>
        <span class="phase-name">Gantry Assembly</span>
        <span class="phase-est">~8-12h remaining</span>
      </div>

      <!-- Main Grid -->
      <div class="main-grid">

        <!-- Left Column -->
        <div>
          <!-- Progress Panel -->
          <div class="panel" style="margin-bottom:20px;">
            <div class="panel-header">
              <span class="panel-title"><span class="acc">//</span> BUILD_PROGRESS</span>
              <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim);">${pct}%</span>
            </div>
            <div class="panel-body">
              <div class="gauge-wrap">
                <div class="gauge-ring">
                  <svg viewBox="0 0 80 80">
                    <circle class="bg" cx="40" cy="40" r="36"/>
                    <circle class="fg" cx="40" cy="40" r="36"
                      stroke-dashoffset="${offset}"
                      style="stroke-dasharray:${C}"/>
                  </svg>
                </div>
                <div class="gauge-info">
                  <h3>${doneCount} / ${totalCount}</h3>
                  <div class="sub">tasks completed</div>
                </div>
              </div>
              <div class="progress-strip">
                <div class="label">
                  <span>Frame Build</span>
                  <span class="pct">100%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
              </div>
              <div class="progress-strip">
                <div class="label">
                  <span>Gantry Assembly</span>
                  <span class="pct">27%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:27%"></div></div>
              </div>
              <div class="progress-strip">
                <div class="label">
                  <span>Overall Build</span>
                  <span class="pct">${pct}%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
              </div>
            </div>
          </div>

          <!-- Task List -->
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title"><span class="acc">//</span> TASK_LIST</span>
              <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim);">${doneCount} done · ${pendingCount} pending</span>
            </div>
            <div class="panel-body" style="padding:0;">
              <table class="task-table">
                <thead>
                  <tr>
                    <th style="width:55%">Task</th>
                    <th style="width:15%">Time</th>
                    <th style="width:30%;text-align:right">Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.tasks.map(t => `
                    <tr>
                      <td>
                        <span class="task-status-led">
                          <span class="led ${t.status}"></span>
                          ${t.name}
                        </span>
                      </td>
                      <td><span class="task-time">${t.time}</span></td>
                      <td style="text-align:right">
                        <span class="task-badge ${t.status}">${t.status === 'active' ? 'In Progress' : t.status === 'done' ? 'Done' : 'Pending'}</span>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Right Column -->
        <div>

          <!-- Stats -->
          <div class="panel" style="margin-bottom:20px;">
            <div class="panel-header">
              <span class="panel-title"><span class="acc">//</span> PROJECT_STATS</span>
            </div>
            <div class="panel-body">
              <div class="stats-grid">
                <div class="stat-item">
                  <div class="num accent">${phaseDone + (phaseActive ? 0.5 : 0)}</div>
                  <div class="lbl">of 5 phases</div>
                </div>
                <div class="stat-item">
                  <div class="num green">${doneCount}</div>
                  <div class="lbl">tasks done</div>
                </div>
                <div class="stat-item">
                  <div class="num">${pendingCount}</div>
                  <div class="lbl">remaining</div>
                </div>
                <div class="stat-item">
                  <div class="num cyan">~10h</div>
                  <div class="lbl">est. left</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Milestone Timeline -->
          <div class="panel" style="margin-bottom:20px;">
            <div class="panel-header">
              <span class="panel-title"><span class="acc">//</span> PHASE_TIMELINE</span>
            </div>
            <div class="panel-body">
              <div class="timeline">
                ${data.phases.map(p => `
                  <div class="timeline-step">
                    <div class="timeline-dot ${p.status}"></div>
                    <div class="tl-name">${p.name}</div>
                    <div class="tl-status ${p.status}">${p.status === 'active' ? 'NOW' : p.status === 'done' ? 'DONE' : 'NEXT'}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- Quick Links -->
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title"><span class="acc">//</span> QUICK_LINKS</span>
            </div>
            <div class="panel-body">
              <div class="links-list">
